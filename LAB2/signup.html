<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>영화공방</title>
    <link href="main.css" rel="stylesheet" type="text/css">
</head>
<body>
    
    <p class="mainTitle"> 새로 오신 걸 환영해요. </p>
    <p class="redirect"><a href="login.html">로그인</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="underline">회원가입</span></p>
    <div class="outerbox"> 가입하려면 <br>아래의 정보를 입력해주세요.
        <form method="get">
            <p class="inputs"><label>이름 : <input type="text" name = "name" placeholder="이름을 작성해주세요." required autofocus></label></p>
            <p class="inputs">이메일 : <label><input type="email" required name = "email"  placeholder="examples@example.com" autocomplete="email"></label></p>
            <p class="inputs"><label>생년월일 : <input type="date" name = "date" required></label></p>
            <p class="inputs">성별 : <label><input type="radio" name = "gender" required value="male">남성</label> <label><input type="radio" value="female" name = "gender" required>여성</label></p>
            <p class="inputs">대학 학년 : <label><input type="number" name = "grade" min="1" max="9" step="1" value="1" required></label></p>
            <p class="inputs">아이디 : <label><input type="text" name = "id" required></label></p>
            <p class="inputs">비밀번호 : <label><input type="password" name = "password" required></label></p>
            <p class="inputs" > 좋아하는 영화 장르 : <select name="genre">
                <option>딱히 없음</option>
                <option>코미디</option>
                <option>액션</option>
                <option>공포</option>   
                <option>스릴러</option>
                <option>로맨스</option>
            </select></p>
            <p><input type="submit" value="회원가입" class="submit">&emsp;<input class="reset" type="reset" value="취소"></p>
        </form>
    </div>
</body>
</html>
